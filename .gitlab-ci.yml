image: golang:latest

stages:
  - build
  - deploy

format:
  stage: build
  script:
    - test -z "$(gofmt -l ./)"

vet:
  stage: build
  script:
    - go vet -json ./... | tee vet-report.json
  artifacts:
    when: always
    paths:
      - vet-report.json
    expire_in: 1 hour

#golint:
#  stage: build
#  script:
#    - go install golang.org/x/lint/golint@latest # ideally we should version pin
#    - golint -set_exit_status ./...

build:
  stage: build
  script:
    - go build ./...
  artifacts:
    # instead of manually adding i.e. the built binaries, we can instead just
    # grab anything not tracked in Git
    untracked: true
    expire_in: 1 hour

deploy:
  stage: deploy
  script:
    - echo "Deploying the app"
    - chmod og= $ID_RSA
    - apk update && apk add openssh-client
    - scp -i $ID_RSA -o StrictHostKeyChecking=no checkers $SERVER_USER@$SERVER_IP:/projects/aboo
