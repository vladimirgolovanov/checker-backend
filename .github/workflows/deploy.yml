name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker compose --project-name checkers-backend --file=docker-compose-checkers-backend-github-prod.yml build
          docker compose --project-name checkers-backend --file=docker-compose-checkers-backend-github-prod.yml push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/id_rsa docker-compose-checkers-backend-github-prod.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/projects/aboo/checker/docker-compose-checkers-backend-github-prod.yml
          scp -r -i ~/.ssh/id_rsa docker ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/projects/aboo/checker

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /projects/aboo/checker
            docker compose --project-name checkers-backend --file=docker-compose-checkers-backend-github-prod.yml pull
            docker compose --project-name checkers-backend --file=docker-compose-checkers-backend-github-prod.yml down
            docker compose --project-name checkers-backend --file=docker-compose-checkers-backend-github-prod.yml up -d --remove-orphans
          EOF
